services:
  freebox-monitor:
    build: .
    # network_mode: host est indispensable pour résoudre mafreebox.freebox.fr
    # via le DNS de la Freebox (réseau local uniquement).
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data:/app/data             # Base SQLite + clé Fernet (persistant)
      - ./certs:/app/certs           # Certificats SSL (générés au 1er démarrage)
      - ./credentials.json:/app/credentials.json  # Token Freebox (créé via auth)
    environment:
      # Optionnel : clé Fernet externe au lieu de data/.secret_key
      # - FBX_MASTER_KEY=votre_cle_fernet_base64

  # Service d'autorisation Freebox (à lancer UNE SEULE FOIS avant le premier démarrage)
  # Commande : docker compose run --rm -it freebox-monitor auth
  auth:
    build: .
    network_mode: host
    volumes:
      - ./credentials.json:/app/credentials.json
    entrypoint: ["python3", "auth.py"]
    profiles:
      - setup
