<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Réinitialisation — Freebox Monitor</title>
<script>(function(){var t=localStorage.getItem('fbx-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e2e8f0;--muted:#718096;--blue:#4299e1;--red:#fc8181;--green:#48bb78}
[data-theme="light"]{--bg:#f0f4f8;--card:#ffffff;--border:#cbd5e0;--text:#1a202c;--muted:#4a5568;--blue:#3182ce;--red:#c53030;--green:#276749}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;width:100%;max-width:420px;text-align:center}
.logo{font-size:48px;margin-bottom:8px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.form-group{text-align:left;margin-bottom:16px;position:relative}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
.form-group input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;outline:none}
.form-group input:focus{border-color:var(--blue)}
.code-input{font-size:24px;font-weight:700;letter-spacing:8px;text-align:center}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;
  font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{opacity:.9}
.error{background:rgba(252,129,129,.12);color:var(--red);padding:10px;border-radius:8px;
  font-size:13px;margin-bottom:16px;text-align:left}
.info{background:rgba(66,153,225,.12);color:var(--blue);padding:10px;border-radius:8px;
  font-size:13px;margin-bottom:20px;text-align:left}
.link-row{margin-top:16px;font-size:13px;text-align:center;color:var(--muted)}
.link-row a{color:var(--blue)}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔒</div>
  <h1>Nouveau mot de passe</h1>
  <p class="sub">Compte : <strong>{{ username }}</strong></p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  {% if sent %}
  <div class="info">Un code à 6 chiffres a été envoyé à votre email de récupération. Il est valable 15 minutes.</div>
  {% endif %}

  <form method="POST" action="/reset-password" id="reset-form">

    {% if not no_smtp %}
    <div class="form-group">
      <label>Code reçu par email</label>
      <input type="text" name="code" class="code-input" maxlength="6" pattern="\d{6}"
             placeholder="000000" required autofocus inputmode="numeric">
    </div>
    <hr class="divider">
    {% endif %}

    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <div class="pw-wrap">
        <input type="password" name="new_password" id="pw1" required minlength="4">
        <button type="button" class="eye" onclick="toggle('pw1',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <div class="pw-wrap">
        <input type="password" name="confirm_password" id="pw2" required minlength="4">
        <button type="button" class="eye" onclick="toggle('pw2',this)">👁</button>
      </div>
    </div>

    <button type="submit" class="btn">Réinitialiser le mot de passe</button>
  </form>
  <div class="link-row"><a href="/login">← Retour à la connexion</a></div>
</div>
<script>
function toggle(id, btn){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'👁':'🙈';
}
document.getElementById('reset-form').addEventListener('submit',function(e){
  const p1=document.getElementById('pw1').value;
  const p2=document.getElementById('pw2').value;
  if(p1!==p2){e.preventDefault();alert('Les mots de passe ne correspondent pas.');}
});
</script>
</body>
</html>
