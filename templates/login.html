<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Connexion — Freebox Monitor</title>
<script>(function(){var t=localStorage.getItem('fbx-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e2e8f0;--muted:#718096;--blue:#4299e1;--red:#fc8181}
[data-theme="light"]{--bg:#f0f4f8;--card:#ffffff;--border:#cbd5e0;--text:#1a202c;--muted:#4a5568;--blue:#3182ce;--red:#c53030}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;width:100%;max-width:400px;text-align:center}
.logo{font-size:48px;margin-bottom:8px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.form-group{text-align:left;margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
.form-group input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;outline:none}
.form-group input:focus{border-color:var(--blue)}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;
  font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{opacity:.9}
.error{background:rgba(252,129,129,.12);color:var(--red);padding:10px;border-radius:8px;
  font-size:13px;margin-bottom:16px}
.success{background:rgba(72,187,120,.12);color:#48bb78;padding:10px;border-radius:8px;
  font-size:13px;margin-bottom:16px}
.link-row{margin-top:14px;font-size:13px;text-align:center;color:var(--muted)}
.link-row a{color:var(--blue)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📡</div>
  <h1>Freebox Monitor</h1>
  <p class="sub">Connectez-vous pour accéder au dashboard</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn">Connexion</button>
  </form>
  <div class="link-row"><a href="/forgot-password">Mot de passe oublié ?</a></div>
  <div class="link-row" style="margin-top:8px"><button onclick="toggleTheme()" id="theme-btn" style="background:none;border:none;cursor:pointer;font-size:18px">☀️</button></div>
</div>
<script>
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme')||'dark';var n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('fbx-theme',n);document.getElementById('theme-btn').textContent=n==='dark'?'☀️':'🌙';}
(function(){var t=document.documentElement.getAttribute('data-theme')||'dark';var b=document.getElementById('theme-btn');if(b)b.textContent=t==='dark'?'☀️':'🌙';})();
</script>
</body>
</html>
